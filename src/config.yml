# ===================== FarmCountdown 設定 =====================
# s2e-farm-pro の「ゲーム開始カウントダウン秒数」(既定10秒・プラグイン内ハードコード)を、
# 実行中のカウントダウン(BukkitRunnable)へのリフレクションで上書きする実験的プラグイン。
#
# ⚠ 重要:
#  - s2e-farm-pro は難読化された有料プラグインです。その内部状態を外部から書き換えます。
#    必ず「配信外」でテストし、ライセンス/利用規約にご注意ください。
#  - カウントダウンの初期値はゲーム開始ごとに作り直されるため、本プラグインは
#    「新しいカウントダウンを検知するたびに残り秒数を上書き」します（毎ゲーム適用）。
#  - どの int フィールドが「画面の残り秒数」かはバージョンにより異なります。
#    まず debug=true のままゲームを開始し、ログで 10→0 と減る field の index を確認してから
#    remaining-field-index を設定し、enabled=true にしてください。
# ==============================================================

# 対象プラグイン名。
source-plugin: s2e-farm-pro

# true で残り秒数の上書きを有効化（事前に正しい field を debug で特定すること）。
enabled: false

# 上書きする秒数（1〜3600）。新しいカウントダウン検知時に適用。
seconds: 10

# カウントを刻む BukkitRunnable の「残り秒数」を保持する int フィールドの index（0 か 1）。
# debug ログで「10,9,8...」と画面と同じく減るほうの index を指定する。
remaining-field-index: 1

# 対象 ticker クラス名（難読化名）。空なら自動検出（形状で判定＝推奨）。
#   自動検出 = source-plugin が所有するタスクの中から、int フィールドの数が
#   min-int-fields〜max-int-fields の範囲にある BukkitRunnable を探す。
#   ※ カウントダウンは int がちょうど2個。アリーナ本体タイマー(int 4個)は除外するため max=2。
#   farm-pro 更新で難読化名が変わっても、形状検出なら追従できる。
ticker-class: ""
min-int-fields: 2
max-int-fields: 2

# 何 tick ごとにカウントダウンを探すか（1=毎tick。早く捕まえるほど上書きが確実）。
poll-interval-ticks: 1

# 検出した ticker の int フィールド値をログ出力（正しい field を特定するため）。
debug: true
# 1インスタンスあたりのログ上限（スパム防止）。
max-debug-logs: 30
